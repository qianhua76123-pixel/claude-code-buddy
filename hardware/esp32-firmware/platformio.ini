; PlatformIO Project Configuration for AI Pet ESP32
; Quick Start:
;   1. Install PlatformIO (VS Code extension or CLI)
;   2. Open this folder in VS Code
;   3. Click "Upload" button or run: pio run -t upload

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv

; For boards with PSRAM
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; Display
    bodmer/TFT_eSPI@^2.5.43
    ; WebSocket client
    gilmaimon/ArduinoWebsockets@^0.5.4
    ; JSON
    bblanchon/ArduinoJson@^7.2.0
    ; Audio
    earlephilhower/ESP8266Audio@^1.9.7
    ; WiFi Manager (easy WiFi setup)
    tzapu/WiFiManager@^2.0.17

; TFT_eSPI display config - adjust for your specific screen
; For 1.69" ST7789 240x280:
build_unflags = -DUSER_SETUP_LOADED
extra_scripts = pre:setup_display.py
